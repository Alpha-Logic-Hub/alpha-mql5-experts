name: Alpha MQL5 — CI Pipeline

on:
  push:
    paths:
      - 'Expert/**'
      - 'Shared/**'
      - '.skills/**'
      - '.sdd/**'
      - '.atl/**'
      - '.github/**'
  pull_request:
    paths:
      - 'Expert/**'
      - 'Shared/**'
      - '.skills/**'
      - '.sdd/**'
      - '.atl/**'
      - '.github/**'
  workflow_dispatch:

jobs:
  validate-sdd:
    name: Validate SDD Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SDD structure
        run: |
          echo "=== Validating SDD structure ==="
          failures=0
          test -f .sdd/config.yaml && echo "✅ config.yaml" || { echo "❌ config.yaml"; failures=$((failures+1)); }
          test -f .sdd/sdd_master.md && echo "✅ sdd_master.md" || { echo "❌ sdd_master.md"; failures=$((failures+1)); }
          test -f .atl/skill-registry.md && echo "✅ skill-registry.md" || { echo "❌ skill-registry.md"; failures=$((failures+1)); }
          if [ $failures -gt 0 ]; then echo "❌ $failures SDD check(s) failed"; exit 1; fi

      - name: Validate skill count
        run: |
          echo "=== Skill Directory Audit ==="
          skills=$(find .skills -name "SKILL.md" | wc -l)
          echo "Skills registered: $skills"
          test $skills -ge 3 && echo "✅ Minimum 3 skills present" || echo "⚠️ Fewer than 3 skills"

  lint-mql5:
    name: Lint MQL5 Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check MQL5 conventions
        run: |
          echo "=== Naming Convention Audit ==="
          failures=0

          echo "--- Check #pragma once (MQL5 INVALID) ---"
          if grep -rn "#pragma once" Expert/ Shared/; then echo "❌ Found #pragma once"; failures=$((failures+1)); else echo "✅ No #pragma once"; fi

          echo "--- Check include paths (must be relative) ---"
          if grep -rn 'MQL5\\Include' Expert/; then echo "❌ Found absolute paths"; failures=$((failures+1)); else echo "✅ No absolute MQL5\\Include paths"; fi

          echo "--- Check Color (must be lowercase) ---"
          if grep -rn '\bColor\b' Expert/ Shared/; then echo "❌ Found uppercase Color"; failures=$((failures+1)); else echo "✅ No uppercase Color"; fi

          if [ $failures -gt 0 ]; then echo "❌ $failures convention violation(s) found"; exit 1; fi

      - name: Verify risk guardrails
        run: |
          echo "=== SoulzBTC Compliance Audit ==="

          echo "--- RISK-002: No hardcoded lots ---"
          ! grep -rn '0\.0[1-9]' Expert/ Shared/ | grep -v "input" | grep -v "InpFixedLot" && echo "✅" || echo "⚠️"

          echo "--- RISK-003: GetMinStopDistance present ---"
          failures=0
          grep -rn "GetMinStopDistance" Expert/ Shared/ > /dev/null && echo "✅" || { echo "❌"; failures=$((failures+1)); }

          echo "--- ERR-001: ResultRetcode present ---"
          grep -rn "ResultRetcode" Expert/ Shared/ > /dev/null && echo "✅" || { echo "❌"; failures=$((failures+1)); }

          if [ $failures -gt 0 ]; then echo "❌ $failures risk check(s) failed"; exit 1; fi

  readme-sync:
    name: README Cross-Reference Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify cross-repo links
        run: |
          echo "=== Cross-Repo Documentation Check ==="
          test -f README.md && echo "✅ README.md present" || echo "❌ Missing README.md"
          test -f alpha-logic-hub-docs/README.md && echo "✅ Docs repo accessible" || echo "⚠️ Docs repo not accessible"
