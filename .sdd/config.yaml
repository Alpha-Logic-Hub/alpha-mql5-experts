# Alpha Logic Hub — SDD Master Config
project: Alpha_Logic_Hub
version: 1.0.0
stack: mql5
market: XAUUSD (primary), multi-asset

models:
  sdd-explore: gemini-2.5-flash
  sdd-propose: gemini-2.5-flash
  sdd-init: gemini-2.5-flash
  sdd-spec: gemini-1.5-pro
  sdd-design: gemini-1.5-pro
  sdd-apply: gemini-1.5-pro
  sdd-verify: gemini-2.5-flash
  sdd-archive: gemini-2.5-flash

soulzbtc_guardrails:
  RISK-001:
    rule: Max 1% risk per trade
    enforcement: InpRiskPercent > 1.0 -> INIT_PARAMETERS_INCORRECT
  RISK-002:
    rule: Dynamic lot sizing only
    enforcement: SymbolInfoDouble for step/min/max; no literal lot values
  RISK-003:
    rule: Mandatory SL + daily shield
    enforcement: GetMinStopDistance triple MathMax; IsShieldTriggered <=
  RISK-004:
    rule: No martingale/grids
    enforcement: Zero lot multiplier logic; CountActivePositions exposure cap
  ERR-001:
    rule: Audit OrderSend ticket
    enforcement: ResultRetcode + GetLastError post-order
  ERR-002:
    rule: Spread check pre-trade
    enforcement: Max spread threshold before OrderSend
  ERR-003:
    rule: Print() logging
    enforcement: Every critical action logged

architecture:
  pattern: modular (.mq5 orchestrates, .mqh by responsibility)
  include_convention: relative paths from Expert directory
  naming: PascalCase (InpRiskPercent, CalculateLotSize)

delivery:
  review_budget: 400
  pr_strategy: ask-always
  execution_mode: interactive

testing:
  strict_tdd: false
  reason: MQL5 has no unit test framework — no xUnit, no mocking, no assertion library. Compilation gates and visual backtesting are the only validation mechanisms.
  compiler:
    path: C:\Program Files\MetaTrader 5\metaeditor64.exe
    command: metaeditor64 /compile /log /s
    verified: true
  backtest:
    tool: MetaTrader 5 Strategy Tester
    type: visual/system-level only
  static_analysis:
    pre_compile_audit: true
    checks:
      - No #pragma once
      - lowercase color keyword
      - PascalCase inputs prefix Inp
      - RISK guardrail compliance
  layers:
    unit: false
    integration: false
    e2e: false
  coverage: false
  quality_tools:
    linter: false
    type_checker: false
    formatter: false
  test_command: ""
  build_command: scripts/build.ps1 -EA "{ea_name}"

artifacts:
  mode: openspec
  base_path: .sdd/
  specs_path: .sdd/specs/
  changes_path: .sdd/changes/
