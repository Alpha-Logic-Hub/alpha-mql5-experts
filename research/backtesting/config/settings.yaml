# Alpha Logic Hub — Backtesting Configuration
# Default settings for XAUUSD forex backtesting

backtest:
  default_capital: 10000
  commission: 0.0            # Forex typically no commission
  spread_points: 20          # XAUUSD average spread in points (20 = $0.20/round trip)
  slippage: 0.0001           # 0.01% slippage

risk:
  max_position_size: 0.95
  stop_loss: null            # Optional: 0.05 = 5% stop loss
  take_profit: null          # Optional: 0.10 = 10% take profit

data:
  provider: mt5              # mt5 or yfinance
  cache_dir: ./data
  default_symbol: XAUUSD
